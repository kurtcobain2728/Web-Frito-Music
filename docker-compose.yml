services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host

  # Opcional: Levantar la versión de producción localmente para pruebas
  # production:
  #   build: .
  #   ports:
  #     - "8080:80"
